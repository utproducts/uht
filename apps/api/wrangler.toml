name = "uht"
main = "src/index.ts"
compatibility_date = "2024-10-18"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "uht-db"
database_id = "3aa708ea-fcfb-4c90-b487-33b18556e08c"

# KV Namespace for sessions/cache
[[kv_namespaces]]
binding = "SESSIONS"
id = "9bfc3fda183f40dcb2bbaae0ff07b2c3"

# R2 Bucket for file storage (logos, images, merch templates)
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "uht-assets"

# Environment variables (set via wrangler secret)
# STRIPE_SECRET_KEY
# SENDGRID_API_KEY
# TEXTMAGIC_USERNAME
# TEXTMAGIC_API_KEY
# CLAUDE_API_KEY
# JWT_SECRET
# USA_HOCKEY_API_KEY

[vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "*"
